name: Feature request
description: Propose a new capability, model integration, or API improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
      placeholder: Today it is difficult to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, workflow, model integration, or behavior you want.
      placeholder: I propose adding...
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example or context
      description: Show a small example, link prior art, or explain why this matters.
      render: python
      placeholder: |
        from rs_embed import ...

        ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add tradeoffs, constraints, related issues, or anything else reviewers should know.
      placeholder: |
        Related issue:
        Related docs or repo:
        Tradeoffs:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests before opening this request.
          required: true
