site_name: rs-embed
site_description: A unified Python toolkit for Remote Sensing Foundation Model embeddings
repo_url: https://github.com/cybergis/rs-embed
repo_name: cybergis/rs-embed

theme:
  name: material
  icon:
    annotation: material/arrow-right-circle
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  /models/dynamicvis.md

nav:
  - Home: index.md
  - Learn:
    - Quickstart: quickstart.md
    - Concepts: concepts.md
  - Guides:
    - Workflows: workflows.md
    - Model Overview: models.md
  - Reference:
    - Advanced Model Reference: models_reference.md
    - Model Details:
      - Precomputed:
        - gse: models/gse.md
        - copernicus: models/copernicus.md
        - tessera: models/tessera.md
      - On-the-fly:
        - remoteclip: models/remoteclip.md
        - satmae: models/satmae.md
        - satmaepp family: models/satmaepp.md
        - scalemae: models/scalemae.md
        - wildsat: models/wildsat.md
        - prithvi: models/prithvi.md
        - terramind: models/terramind.md
        - dofa: models/dofa.md
        - fomo: models/fomo.md
        - thor: models/thor.md
        - satvision: models/satvision.md
        - terrafm: models/terrafm.md
        - anysat: models/anysat.md
        - galileo: models/galileo.md
        - agrifm: models/agrifm.md
    - Overview: api.md
    - Specs & Data Structures: api_specs.md
    - Embedding API: api_embedding.md
    - Export API: api_export.md
    - Inspect API: api_inspect.md
    - Limitations: limitations.md
  - Development:
    - Extending: extending.md
    - Model Template: model_detail_template.md
